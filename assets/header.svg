<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Om Seth — Software Engineer and AI/ML Enthusiast</title>
  <desc id="desc">A dark portfolio-style GitHub profile banner with blue accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#12131A"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#7AAACE" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#7AAACE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1E2030" stroke-width="1"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)" opacity="0.75"/>
  <rect width="1200" height="360" rx="28" fill="url(#glow)"/>

  <circle cx="1050" cy="72" r="86" fill="#7AAACE" opacity="0.10" filter="url(#soft)"/>
  <circle cx="1110" cy="270" r="110" fill="#9CD5FF" opacity="0.08" filter="url(#soft)"/>

  <g transform="translate(72 67)">
    <rect x="0" y="0" width="10" height="224" rx="5" fill="#7AAACE"/>
    <text x="38" y="66" fill="#F7F8F0" font-family="Geist Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="62" font-weight="700" letter-spacing="3">OM SETH</text>
    <text x="41" y="112" fill="#9CD5FF" font-family="Geist Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="23" font-weight="600">SOFTWARE ENGINEER · AI/ML ENTHUSIAST</text>

    <text x="41" y="163" fill="#8892A4" font-family="Geist Sans, Inter, Arial, sans-serif"
          font-size="22">Building intelligent products, full-stack systems,</text>
    <text x="41" y="194" fill="#8892A4" font-family="Geist Sans, Inter, Arial, sans-serif"
          font-size="22">and interactive web experiences.</text>

    <g transform="translate(41 226)" font-family="Geist Mono, ui-monospace, monospace" font-size="16" font-weight="600">
      <rect width="122" height="38" rx="19" fill="#12131A" stroke="#1E2030"/>
      <text x="61" y="24" fill="#F7F8F0" text-anchor="middle">NEXT.JS</text>

      <rect x="136" width="118" height="38" rx="19" fill="#12131A" stroke="#1E2030"/>
      <text x="195" y="24" fill="#F7F8F0" text-anchor="middle">AI / NLP</text>

      <rect x="268" width="142" height="38" rx="19" fill="#12131A" stroke="#1E2030"/>
      <text x="339" y="24" fill="#F7F8F0" text-anchor="middle">PYTHON · C++</text>

      <rect x="424" width="164" height="38" rx="19" fill="#12131A" stroke="#1E2030"/>
      <text x="506" y="24" fill="#F7F8F0" text-anchor="middle">DOCKER · LINUX</text>
    </g>
  </g>

  <g transform="translate(960 116)">
    <rect x="0" y="0" width="152" height="128" rx="18" fill="#12131A" stroke="#1E2030" stroke-width="2"/>
    <rect x="18" y="18" width="34" height="34" rx="8" fill="#7AAACE" opacity="0.95"/>
    <rect x="59" y="18" width="34" height="34" rx="8" fill="#1E2030"/>
    <rect x="100" y="18" width="34" height="34" rx="8" fill="#9CD5FF" opacity="0.75"/>
    <rect x="18" y="59" width="34" height="34" rx="8" fill="#1E2030"/>
    <rect x="59" y="59" width="34" height="34" rx="8" fill="#7AAACE" opacity="0.55"/>
    <rect x="100" y="59" width="34" height="34" rx="8" fill="#1E2030"/>
    <rect x="18" y="100" width="116" height="10" rx="5" fill="#8892A4" opacity="0.45"/>
  </g>

  <rect x="1" y="1" width="1198" height="358" rx="27" fill="none" stroke="#1E2030" stroke-width="2"/>
</svg>
